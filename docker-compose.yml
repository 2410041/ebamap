version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
    container_name: ebamap_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - php
    command: npm run dev -- --host 0.0.0.0

  php:
    build:
      context: ./api
    container_name: ebamap_php
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: ebamap_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ebamap
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: ebamap_phpmyadmin
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
