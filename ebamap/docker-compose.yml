version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
    container_name: ebamap_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host

  backend:
    build:
      context: ./backend
    container_name: ebamap_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
